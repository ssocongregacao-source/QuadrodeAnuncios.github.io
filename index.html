<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadro de Anúncios - Congregação SSO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 30px 15px 10px 15px;
    color: white;
}

header h1 {
    margin: 0;
    font-size: 26px;
}

header p {
    margin-top: 5px;
    font-size: 16px;
    opacity: 0.9;
}

.card {
    background: white;
    width: 90%;
    max-width: 600px;
    margin: 20px auto;
    padding: 25px 20px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    text-align: center;
}

.pdf-link {
    display: block;
    margin: 18px 0;
    padding: 18px;
    background-color: #2a5298;
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    transition: 0.3s;
}

.pdf-link:active {
    transform: scale(0.97);
}

.pdf-link:hover {
    background-color: #1e3c72;
}

.info {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
}

.fullscreen-btn {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #1e3c72;
    color: white;
    cursor: pointer;
    font-size: 15px;
}

footer {
    margin-top: auto;
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: white;
    opacity: 0.8;
}

/* Ajustes extras para telas muito pequenas */
@media (max-width: 400px) {
    header h1 {
        font-size: 22px;
    }

    .pdf-link {
        font-size: 16px;
        padding: 16px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Quadro de Anúncios</h1>
    <p>Congregação SSO</p>
</header>

<div class="card">

    <a class="pdf-link" href="042026-GRUPOS.pdf" target="_blank">
        📄 Grupos de Saída de Campo e Limpeza
    </a>
    
    <a class="pdf-link" href="042026-FIM_SEMANA.pdf" target="_blank">
        📄 Reunião de Fim de Semana
    </a>

    <a class="pdf-link" href="042026-MEIO_DE_SEMANA.pdf" target="_blank">
        📄 Reunião do Meio de Semana
    </a>

    <a class="pdf-link" href="042026-CAMPO.pdf" target="_blank">
        📄 Serviço de Campo
    </a>

    <a class="pdf-link" href="042026-Apostila.pdf" target="_blank">
        📄 Apostila Vida e Ministério
    </a>

    <a class="pdf-link" href="042026-LIMPEZA.pdf" target="_blank">
        📄 Limpeza do Salão do Reino
    </a>
    
    <a class="pdf-link" href="S-30.pdf" target="_blank">
        📄 Relatório Financeiro
    </a>
    
    <a class="pdf-link" href="042026-AnEscritorio.pdf" target="_blank">
        📄 Anúncios do Escritório
    </a>
    
    <div class="info" id="dataHora"></div>

    <button class="fullscreen-btn" onclick="ativarTelaCheia()">
        📺 Modo Tela Cheia
    </button>

</div>

<footer>
    © <span id="anoAtual"></span> Congregação SSO
</footer>

<script>
function atualizarDataHora() {
    const agora = new Date();
    const opcoes = { 
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };
    const data = agora.toLocaleDateString('pt-BR', opcoes);
    const hora = agora.toLocaleTimeString('pt-BR');
    document.getElementById("dataHora").innerHTML =
        "Atualizado em: " + data + " às " + hora;
}

setInterval(atualizarDataHora, 1000);
atualizarDataHora();

document.getElementById("anoAtual").innerHTML = new Date().getFullYear();

function ativarTelaCheia() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
}
</script>

</body>
</html>
