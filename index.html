<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Quadro de Anúncios - Congregação SSO</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 30px 20px 10px 20px;
    color: white;
}

.logo {
    max-width: 120px;
    margin-bottom: 15px;
}

header h1 {
    margin: 0;
    font-size: 30px;
}

header p {
    margin-top: 5px;
    font-size: 17px;
    opacity: 0.9;
}

.card {
    background: white;
    max-width: 650px;
    margin: 30px auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    text-align: center;
}

.pdf-link {
    display: block;
    margin: 15px 0;
    padding: 15px;
    background-color: #2a5298;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-size: 17px;
    font-weight: 600;
    transition: 0.3s;
}

.pdf-link:hover {
    background-color: #1e3c72;
    transform: scale(1.04);
}

.info {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
}

.fullscreen-btn {
    margin-top: 20px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: #1e3c72;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.fullscreen-btn:hover {
    background: #16325c;
}

footer {
    margin-top: auto;
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: white;
    opacity: 0.8;
}
</style>
</head>

<body>

<header>
    <!-- Se tiver logo, descomente a linha abaixo -->
    <!-- <img src="logo.png" class="logo"> -->

    <h1>📢 Quadro de Anúncios</h1>
    <p>Congregação SSO</p>
</header>

<div class="card">

    <a class="pdf-link" href="02_2026-Reuni%C3%A3o%20de%20fim%20de%20semana.pdf" target="_blank">
        📄 Reunião de Fim de Semana
    </a>

    <a class="pdf-link" href="02_2026-Reuni%C3%A3o%20do%20meio%20de%20semana.pdf" target="_blank">
        📄 Reunião do Meio de Semana
    </a>

    <a class="pdf-link" href="02_2026-Servi%C3%A7o%20de%20Campo.pdf" target="_blank">
        📄 Serviço de Campo
    </a>

    <a class="pdf-link" href="Apostila-Fevereiro-2026.pdf" target="_blank">
        📄 Apostila Fevereiro 2026
    </a>

    <div class="info" id="dataHora"></div>

    <button class="fullscreen-btn" onclick="ativarTelaCheia()">
        📺 Modo Tela Cheia
    </button>

</div>

<footer>
    © <span id="anoAtual"></span> Congregação SSO
</footer>

<script>
// Data e hora automática
function atualizarDataHora() {
    const agora = new Date();
    const opcoes = { 
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };
    const data = agora.toLocaleDateString('pt-BR', opcoes);
    const hora = agora.toLocaleTimeString('pt-BR');
    document.getElementById("dataHora").innerHTML =
        "Atualizado em: " + data + " às " + hora;
}

setInterval(atualizarDataHora, 1000);
atualizarDataHora();

// Ano automático
document.getElementById("anoAtual").innerHTML = new Date().getFullYear();

// Tela cheia
function ativarTelaCheia() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
}
</script>

</body>
</html>
