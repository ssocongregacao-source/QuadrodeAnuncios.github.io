<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Quadro de Anúncios - Congregação SSO</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
            color: white;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        header p {
            margin-top: 8px;
            font-size: 18px;
            opacity: 0.9;
        }

        .card {
            background: white;
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .pdf-link {
            display: block;
            margin: 15px 0;
            padding: 14px;
            background-color: #2a5298;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .pdf-link:hover {
            background-color: #1e3c72;
            transform: scale(1.03);
        }

        .date {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<header>
    <h1>📢 Quadro de Anúncios</h1>
    <p>Congregação SSO</p>
</header>

<div class="card">

    <a class="pdf-link" href="02_2026-Reuni%C3%A3o%20de%20fim%20de%20semana.pdf" target="_blank">
        📄 Reunião de Fim de Semana
    </a>

    <a class="pdf-link" href="02_2026-Reuni%C3%A3o%20do%20meio%20de%20semana.pdf" target="_blank">
        📄 Reunião do Meio de Semana
    </a>

    <a class="pdf-link" href="02_2026-Servi%C3%A7o%20de%20Campo.pdf" target="_blank">
        📄 Serviço de Campo
    </a>

    <a class="pdf-link" href="Apostila-Fevereiro-2026.pdf" target="_blank">
        📄 Apostila Fevereiro 2026
    </a>

    <div class="date" id="dataAtual"></div>

</div>

<footer>
    © 2026 Congregação SSO
</footer>

<script>
    const hoje = new Date();
    const opcoes = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    };
    const dataFormatada = hoje.toLocaleDateString('pt-BR', opcoes);
    document.getElementById("dataAtual").innerHTML = 
        "Atualizado em: " + dataFormatada;
</script>

</body>
</html>
